name: release

# Build installers for Windows, Linux and macOS and publish a GitHub Release
# whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin" # one .dmg for Intel + Apple Silicon
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, needed for the changelog

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync app version to the tag
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version='$V';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')"
          echo "app version set to $V"

      # release notes = commit subjects since the previous version tag; this
      # body also lands in latest.json ("notes") so the in-app update banner
      # can show what changed.
      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          prev=$(git tag --list 'v*' --sort=-v:refname | grep -vx "$GITHUB_REF_NAME" | head -1)
          if [ -n "$prev" ]; then
            range="$prev..$GITHUB_REF_NAME"
            echo "changelog range: $range"
          else
            range="$GITHUB_REF_NAME"
            echo "first release — listing all commits"
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's changed"
            git log "$range" --no-merges --pretty='- %s'
            echo ""
            echo "---"
            echo "Installers (.msi / .exe setup, .dmg, .deb) or the standalone build (portable .exe / .AppImage) — no install needed."
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # code-signing key for the auto-updater (set these as repo secrets)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "jokeGITViewer ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # The installers above don't include the raw standalone exe. Attach the
      # portable Windows build (runs without installing).
      - name: Upload standalone Windows exe
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${GITHUB_REF_NAME#v}"
          # raw binary is named after the cargo package ("jkt"), pick it robustly
          src="src-tauri/target/release/jkt.exe"
          [ -f "$src" ] || src="$(find src-tauri/target/release -maxdepth 1 -name '*.exe' ! -name '*setup*' | head -1)"
          echo "standalone exe: $src"
          out="jokeGITViewer_${V}_x64-portable.exe"
          cp "$src" "$out"
          gh release upload "${GITHUB_REF_NAME}" "$out" --clobber
